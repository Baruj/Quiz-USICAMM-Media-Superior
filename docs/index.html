<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Quiz-USICAMM-Media-Superior</title>
<style>
body {
	font-family: Arial, sans-serif;
	margin: 24px;
	max-width: 960px;
	background: #f8fafc;
}

h1, h2, h3 {
	margin-bottom: 8px;
}

.panel {
	background: #fff;
	border: 1px solid #ddd;
	border-radius: 10px;
	padding: 16px;
	margin-bottom: 18px;
}

label {
	display: block;
	margin-bottom: 6px;
	font-weight: bold;
}

select, input {
	width: 100%;
	max-width: 520px;
	padding: 10px;
	margin-bottom: 12px;
	border: 1px solid #ccc;
	border-radius: 8px;
	box-sizing: border-box;
}

button {
	margin: 4px 6px 4px 0;
	padding: 10px 14px;
	cursor: pointer;
	border: 1px solid #bbb;
	border-radius: 8px;
	background: #fff;
}

button:hover {
	background: #f1f5f9;
}

.picked {
	font-weight: bold;
	outline: 2px solid #2563eb;
}

.saved {
	color: green;
	font-size: 12px;
	margin-left: 8px;
	display: inline-block;
	min-height: 18px;
}

.question-block {
	margin-bottom: 22px;
	padding: 14px;
	border: 1px solid #ddd;
	border-radius: 8px;
	background: #fff;
}

.options-row {
	margin-top: 8px;
	margin-bottom: 8px;
}

.result-banner {
	margin-top: 12px;
	padding: 12px 14px;
	border-radius: 6px;
	font-weight: bold;
	display: none;
}

.result-correct {
	display: block;
	background: #dff5e8;
	color: #0f6b3f;
	border: 1px solid #b7e4c7;
}

.result-incorrect {
	display: block;
	background: #f9e1e4;
	color: #b42318;
	border: 1px solid #f2b8bf;
}

.answer-detail {
	margin-top: 8px;
	font-size: 14px;
	display: none;
	line-height: 1.5;
}

.answer-detail.show {
	display: block;
}

.correct-option {
	background: #dff5e8;
	border: 1px solid #0f6b3f;
}

.wrong-option {
	background: #f9e1e4;
	border: 1px solid #b42318;
}

.score-box {
	margin: 18px 0;
	padding: 12px 14px;
	border-radius: 8px;
	background: #e5eefc;
	font-weight: bold;
	display: none;
}

.muted {
	color: #475569;
	font-size: 14px;
}

#submit-btn {
	margin-top: 14px;
}
</style>
</head>
<body>
<h1>Simulador USICAMM</h1>
<p class="muted">
Selecciona un quiz temático o el quiz integrador, responde y revisa tus resultados.
</p>

<div id="app">Cargando...</div>

<script src="./config.js"></script>
<script>
const API = window.APP_CONFIG?.API_URL || "http://localhost:8000";

let allQuizzes = [];

async function main() {
	const app = document.getElementById("app");
	
	try {
		const quizzesResponse = await fetch(`${API}/quizzes`);
		const quizzes = await quizzesResponse.json();
		
		if (!quizzes.items || !quizzes.items.length) {
			app.textContent = "No hay quizzes disponibles. Ejecuta el seed.";
			return;
		}
		
		allQuizzes = quizzes.items;
		
		app.innerHTML = `
		<div class="panel">
		<h2>Selecciona un quiz</h2>
		<p class="muted">
		La interfaz mostrará los quizzes disponibles. Idealmente habrá 10 temáticos y 1 integrador.
		</p>
		
		<label for="quiz-select">Quiz disponible</label>
		<select id="quiz-select"></select>
		
		<div id="quiz-info" class="panel" style="margin-top:12px;">
		<h3 id="quiz-title"></h3>
		<p id="quiz-description" class="muted"></p>
		</div>
		
		<label for="username">Nombre del usuario (opcional)</label>
		<input id="username" placeholder="Escribe tu nombre" />
		
		<button id="start">Comenzar quiz</button>
		</div>
		
		<div id="score-box" class="score-box"></div>
		<div id="quiz"></div>
		`;
		
		buildQuizSelector(allQuizzes);
		updateQuizInfo();
		
		document.getElementById("quiz-select").addEventListener("change", updateQuizInfo);
		
		document.getElementById("start").onclick = async () => {
			const username = document.getElementById("username").value.trim() || null;
			const selectedQuizId = document.getElementById("quiz-select").value;
			
			const attempt = await (await fetch(`${API}/attempts`, {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify({ quiz_id: selectedQuizId, username })
			})).json();
			
			const data = await (await fetch(`${API}/quizzes/${selectedQuizId}/questions`)).json();
			
			renderQuiz(attempt.attempt_id, data);
		};
	} catch (error) {
		app.textContent = "No fue posible cargar la aplicación.";
		console.error(error);
	}
}

function buildQuizSelector(quizzes) {
	const select = document.getElementById("quiz-select");
	select.innerHTML = "";
	
	quizzes.forEach((quiz) => {
		const option = document.createElement("option");
		option.value = quiz.quiz_id;
		option.textContent = quiz.title;
		select.appendChild(option);
	});
}

function updateQuizInfo() {
	const select = document.getElementById("quiz-select");
	const selectedQuiz = allQuizzes.find(q => q.quiz_id === select.value) || allQuizzes[0];
	
	document.getElementById("quiz-title").textContent = selectedQuiz?.title || "";
	document.getElementById("quiz-description").textContent = selectedQuiz?.description || "";
}

function renderQuiz(attemptId, quizData) {
	const div = document.getElementById("quiz");
	const scoreBox = document.getElementById("score-box");
	
	scoreBox.style.display = "none";
	scoreBox.textContent = "";
	
	div.innerHTML = `
	<div class="panel">
	<h2>${quizData.title || "Quiz seleccionado"}</h2>
	<p class="muted">${quizData.description || ""}</p>
	</div>
	`;
	
	const blocksByQuestionId = {};
	
	quizData.questions.forEach((qq, i) => {
		const block = document.createElement("div");
		block.className = "question-block";
		block.dataset.questionId = qq.question_id;
		
		const title = document.createElement("p");
		title.innerHTML = `<b>${i + 1}.</b> ${qq.prompt}`;
		block.appendChild(title);
		
		const status = document.createElement("span");
		status.className = "saved";
		block.appendChild(status);
		
		const optionsRow = document.createElement("div");
		optionsRow.className = "options-row";
		
		qq.options.forEach((opt, idx) => {
			const btn = document.createElement("button");
			btn.textContent = opt;
			btn.className = "option-btn";
			btn.dataset.optionIndex = String(idx);
			
			btn.onclick = async () => {
				await fetch(`${API}/attempts/${attemptId}/answers`, {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({
						question_id: qq.question_id,
						chosen_index: idx
					})
				});
				
				[...optionsRow.querySelectorAll("button")].forEach(b => {
					b.disabled = true;
					b.classList.remove("picked");
				});
				
				btn.classList.add("picked");
				status.textContent = "Guardado ✓";
			};
			
			optionsRow.appendChild(btn);
		});
		
		block.appendChild(optionsRow);
		
		const resultBanner = document.createElement("div");
		resultBanner.className = "result-banner";
		block.appendChild(resultBanner);
		
		const detail = document.createElement("div");
		detail.className = "answer-detail";
		block.appendChild(detail);
		
		div.appendChild(block);
		
		blocksByQuestionId[qq.question_id] = {
			block,
			optionsRow,
			resultBanner,
			detail
		};
	});
	
	const submit = document.createElement("button");
	submit.id = "submit-btn";
	submit.textContent = "Enviar quiz";
	
	submit.onclick = async () => {
		const res = await (await fetch(`${API}/attempts/${attemptId}/submit`, {
			method: "POST"
		})).json();
		
		scoreBox.style.display = "block";
		scoreBox.textContent = `Puntaje: ${res.score}/${res.max_score}`;
		
		renderResults(res.results, blocksByQuestionId);
		
		submit.disabled = true;
	};
	
	div.appendChild(document.createElement("hr"));
	div.appendChild(submit);
}

function renderResults(results, blocksByQuestionId) {
	results.forEach(r => {
		const item = blocksByQuestionId[r.question_id];
		if (!item) return;
		
		const buttons = [...item.optionsRow.querySelectorAll("button")];
		const chosenBtn = buttons.find(b => Number(b.dataset.optionIndex) === r.chosen_index);
		const correctBtn = buttons.find(b => Number(b.dataset.optionIndex) === r.correct_index);
		
		if (correctBtn) {
			correctBtn.classList.add("correct-option");
		}
		
		if (chosenBtn && r.chosen_index !== r.correct_index) {
			chosenBtn.classList.add("wrong-option");
		}
		
		item.resultBanner.className =
		"result-banner " + (r.is_correct ? "result-correct" : "result-incorrect");
		item.resultBanner.textContent = r.is_correct ? "Correcta" : "Incorrecta";
		
		item.detail.classList.add("show");
		
		let detailHtml = "";
		
		if (r.chosen_option === null || r.chosen_option === undefined) {
			detailHtml += `No respondiste esta pregunta.<br>`;
			detailHtml += `<b>Respuesta correcta:</b> ${r.correct_option}`;
		} else if (r.is_correct) {
			detailHtml += `<b>Tu respuesta:</b> ${r.chosen_option}`;
		} else {
			detailHtml += `<b>Tu respuesta:</b> ${r.chosen_option}<br>`;
			detailHtml += `<b>Respuesta correcta:</b> ${r.correct_option}`;
		}
		
		if (r.explanation) {
			detailHtml += `<br><b>Explicación:</b> ${r.explanation}`;
		}
		
		item.detail.innerHTML = detailHtml;
	});
}

main();
</script>
</body>
</html>
